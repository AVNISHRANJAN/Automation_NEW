name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run unit tests
        run: pytest tests/ -v --tb=short
        env:
          HEADLESS: "true"

      - name: Syntax check all modules
        run: |
          python -m py_compile config.py
          python -m py_compile main.py
          python -m py_compile core/browser.py
          python -m py_compile core/crawler.py
          python -m py_compile core/element_finder.py
          python -m py_compile core/interactor.py
          python -m py_compile core/login_detector.py
          python -m py_compile reporting/screenshot_manager.py
          python -m py_compile reporting/metadata_logger.py
          python -m py_compile reporting/report_builder.py
          python -m py_compile utils/dummy_data.py
          python -m py_compile utils/url_normalizer.py
          python -m py_compile utils/waiter.py
